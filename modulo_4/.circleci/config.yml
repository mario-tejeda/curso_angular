version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:20.12.2-browsers # Standard Node image with browsers for headless Chrome testing
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-
      - run:
          name: Install Project Dependencies
          command: npm install --legacy-peer-deps
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Run Jasmine Unit Tests
          command: npm run test -- --watch=false --browsers=ChromeHeadless
      - run:
          name: Build Production Application
          command: npm run build

workflows:
  version: 2
  build-test-workflow:
    jobs:
      - build-and-test
