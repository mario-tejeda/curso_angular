<form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="form-container">
  <div class="form-group">
    <label for="name" class="form-label">Nombre de la Tarea</label>
    <input 
      type="text" 
      id="name" 
      formControlName="name" 
      placeholder="Ej: Estudiar NgRx Store"
      class="form-input"
      [class.is-invalid]="taskForm.get('name')?.invalid && taskForm.get('name')?.touched"
    />
    
    <div *ngIf="taskForm.get('name')?.touched && taskForm.get('name')?.invalid" class="error-messages">
      <span *ngIf="taskForm.get('name')?.hasError('required')" class="error-item">
        ⚠ El nombre de la tarea es obligatorio.
      </span>
      <span *ngIf="taskForm.get('name')?.hasError('forbiddenWords')" class="error-item">
        ⚠ Palabra prohibida detectada: "{{ taskForm.get('name')?.getError('forbiddenWords').matched }}".
      </span>
    </div>
  </div>

  <div class="form-group">
    <label for="category" class="form-label">Categoría</label>
    <input 
      type="text" 
      id="category" 
      formControlName="category" 
      placeholder="Ej: Trabajo, Estudio, Hogar"
      class="form-input"
      [class.is-invalid]="taskForm.get('category')?.invalid && taskForm.get('category')?.touched"
    />
    
    <div *ngIf="taskForm.get('category')?.touched && taskForm.get('category')?.invalid" class="error-messages">
      <span *ngIf="taskForm.get('category')?.hasError('required')" class="error-item">
        ⚠ La categoría es obligatoria.
      </span>
    </div>
  </div>

  <button type="submit" [disabled]="taskForm.invalid" class="btn btn-submit">
    Agregar Tarea
  </button>
</form>
